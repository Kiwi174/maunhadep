<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hùng Lê Design Studio — Đăng nhập</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#3D6B34;--green2:#5A9E4A;--green-light:#EAF4E7;
  --dark:#141916;--dark2:#1E2420;
  --cream:#F4F3F0;--cream2:#EAEAE6;
  --text:#1A1F18;--muted:#5A6B56;--border:#C8D0C4;
}
body{min-height:100vh;display:flex;font-family:'Be Vietnam Pro',sans-serif;background:var(--dark)}

/* ── HERO ── */
.hero-side{flex:1;position:relative;overflow:hidden}
.hero-side img.bg{width:100%;height:100%;object-fit:cover;filter:brightness(.5);animation:slowzoom 20s ease-in-out infinite alternate}
@keyframes slowzoom{from{transform:scale(1.05)}to{transform:scale(1.13)}}
.hero-overlay{
  position:absolute;inset:0;
  background:linear-gradient(160deg,rgba(26,31,24,.5) 0%,rgba(74,124,63,.18) 100%);
  display:flex;flex-direction:column;justify-content:flex-end;padding:52px
}
.hero-tagline{font-size:42px;font-weight:700;color:#fff;line-height:1.15}
.hero-tagline span{color:var(--green2)}
.hero-sub{margin-top:14px;color:rgba(255,255,255,.75);font-size:13px;letter-spacing:2px;text-transform:uppercase}
.hero-contact{
  margin-top:24px;display:flex;align-items:center;gap:10px;
  background:rgba(255,255,255,.08);border:1px solid rgba(106,175,90,.3);
  border-radius:40px;padding:10px 20px;width:fit-content;
}
.hero-contact span{color:#fff;font-size:15px;font-weight:600;letter-spacing:.5px}

/* ── LOGIN SIDE ── */
.login-side{
  width:440px;flex-shrink:0;background:var(--cream);
  display:flex;flex-direction:column;justify-content:center;padding:56px 48px;
  position:relative;overflow-y:auto;
}
.login-side::before{
  content:'';position:absolute;top:0;left:0;width:3px;height:100%;
  background:linear-gradient(to bottom,transparent,var(--green),transparent)
}

/* ── BRAND ── */
.brand{margin-bottom:32px;display:flex;flex-direction:column;align-items:flex-start}
.brand-logo-img{width:110px;height:auto;margin-bottom:4px}
.brand-sub{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:2px;font-weight:600}
.brand-line{width:36px;height:2px;background:var(--green);margin-top:10px}

/* ── TABS ── */
.tabs{display:flex;gap:0;margin-bottom:26px;border:1px solid var(--border);border-radius:6px;overflow:hidden}
.tab{flex:1;padding:11px;background:#fff;border:none;font-family:inherit;font-size:12px;font-weight:600;
  letter-spacing:1px;text-transform:uppercase;color:var(--muted);cursor:pointer;transition:.2s}
.tab.active{background:var(--green);color:#fff}
.tab:not(.active):hover{background:var(--green-light);color:var(--green)}

/* ── PANELS ── */
.panel{display:none}
.panel.active{display:block}

/* ── FORM ── */
.form-title{font-size:20px;font-weight:700;color:var(--text);margin-bottom:5px}
.form-hint{font-size:13px;color:var(--muted);margin-bottom:22px}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:7px;font-weight:600}
.field input{
  width:100%;padding:13px 15px;border:1px solid var(--border);
  background:#fff;border-radius:4px;font-family:inherit;
  font-size:14px;color:var(--text);outline:none;transition:border-color .2s
}
.field input:focus{border-color:var(--green)}
.field input::placeholder{color:#C0C8BC}

/* ── BUTTONS ── */
.btn{
  width:100%;padding:14px;border:none;font-family:inherit;font-size:12px;
  letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-radius:4px;
  transition:.2s;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;
  text-decoration:none
}
.btn-green{background:var(--green);color:#fff;margin-top:4px}
.btn-green:hover:not(:disabled){background:#3A6330}
.btn-green:disabled{background:#aaa;cursor:not-allowed}
.btn-outline{background:#fff;color:var(--green);border:2px solid var(--green);margin-top:8px}
.btn-outline:hover{background:var(--green-light)}
.btn-blue{background:#0068FF;color:#fff;margin-top:8px}
.btn-blue:hover{background:#0055CC}
.btn-phone{background:var(--green);color:#fff;margin-top:8px}
.btn-phone:hover{background:#3A6330}

/* ── GUEST PANEL ── */
.guest-features{
  background:#fff;border:1px solid var(--border);border-radius:6px;
  padding:18px 20px;margin-bottom:20px
}
.guest-features-title{font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  color:var(--muted);margin-bottom:14px}
.feature-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.feature-row:last-child{margin-bottom:0}
.feature-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;flex-shrink:0;font-size:13px}
.fi-yes{background:var(--green-light)}
.fi-no{background:#FEF2F2}
.feature-text{font-size:13px;color:var(--text);line-height:1.4;padding-top:5px}
.feature-text small{display:block;font-size:11px;color:var(--muted);margin-top:1px}

/* ── DIVIDER ── */
.divider{display:flex;align-items:center;gap:10px;margin:14px 0;color:var(--muted);
  font-size:11px;font-weight:500;letter-spacing:1px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── ERROR ── */
.error-msg{
  display:none;margin-top:10px;padding:11px 15px;
  background:#FFF2F2;border-left:3px solid #D94040;
  font-size:13px;color:#B83030;border-radius:2px
}
.error-msg.show{display:block}

/* ── FOOTER ── */
.login-footer{
  margin-top:28px;padding-top:18px;border-top:1px solid var(--border);text-align:center
}
.login-footer a{
  display:inline-flex;align-items:center;gap:8px;
  color:var(--green);font-size:13px;font-weight:500;text-decoration:none
}
.login-footer a:hover{text-decoration:underline}

/* ── LOADING OVERLAY ── */
.loading-overlay{
  display:none;position:fixed;inset:0;z-index:999;
  background:rgba(20,25,22,.7);backdrop-filter:blur(4px);
  align-items:center;justify-content:center;flex-direction:column;gap:16px
}
.loading-overlay.show{display:flex}
.spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.2);
  border-top-color:var(--green2);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{color:#fff;font-size:14px;font-weight:500}

/* ── RESPONSIVE ── */
@media(min-width:601px) and (max-width:900px){
  .login-side{width:380px;padding:44px 36px}
  .hero-tagline{font-size:32px}
  .hero-overlay{padding:36px}
}
@media(max-width:600px){
  .hero-side{display:none}
  .login-side{width:100%;padding:32px 20px}
  .brand-logo-img{width:80px}
}
</style>
</head>
<body>

<!-- HERO -->
<div class="hero-side">
  <img class="bg" src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=1200&q=80" alt="">
  <div class="hero-overlay">
    <div class="hero-tagline">Thiết kế từ tâm<br><span>nâng tầm</span> tiện ích</div>
    <div class="hero-sub">Thư viện mẫu nhà & dự toán chi phí xây dựng</div>
    <div class="hero-contact">
      <svg width="18" height="18" fill="none" stroke="#6AAF5A" stroke-width="2" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 10.81 19.79 19.79 0 01.14 2.18 2 2 0 012.11 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.91 7.09a16 16 0 006 6l.45-.45a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
      <span>0947.017.495</span>
    </div>
  </div>
</div>

<!-- LOGIN SIDE -->
<div class="login-side">
  <div class="brand">
    <img class="brand-logo-img" src="/logo.png" alt="Hùng Lê Design Studio">
    <div class="brand-sub">Hùng Lê Design Studio</div>
    <div class="brand-line"></div>
  </div>

  <!-- PANEL: ĐĂNG NHẬP -->
  <div class="panel active" id="panelLogin">
    <div class="form-title">Đăng nhập tài khoản</div>
    <div class="form-hint">Dành cho thành viên, CTV và quản trị viên</div>

    <div class="field">
      <label>Tài khoản</label>
      <input type="text" id="username" placeholder="Nhập tài khoản" autocomplete="username">
    </div>
    <div class="field">
      <label>Mật khẩu</label>
      <input type="password" id="password" placeholder="Nhập mật khẩu" autocomplete="current-password">
    </div>

    <button class="btn btn-green" id="btnLogin" onclick="doLogin()">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg>
      Đăng nhập
    </button>
    <div class="error-msg" id="errMsg">Tài khoản hoặc mật khẩu không đúng</div>
  </div>

  <div class="login-footer">
    <a href="tel:0947017495">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 10.81 19.79 19.79 0 01.14 2.18 2 2 0 012.11 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.91 7.09a16 16 0 006 6l.45-.45a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
      Liên hệ hỗ trợ: 0947.017.495
    </a>
  </div>
</div>

<!-- LOADING OVERLAY -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text">Đang đăng nhập...</div>
</div>

<script>
const _a = 'https://script.google.com/macros/s/';
const _b = 'AKfycbwdH-OVryjHOLoUcGKIC542uOPDqVpdUA6CvPftXVJotWinOpeHuBVCNdzd8bDV-Md1';
const SCRIPT_URL = _a + _b + '/exec';

/* ── Nếu đã login rồi thì vào thẳng home ── */
const _r = sessionStorage.getItem('nhadep_role');
if (_r && _r !== 'guest') location.href = 'home.html';

/* ── Nếu bị redirect về do chưa đăng nhập ── */
if (new URLSearchParams(location.search).get('require') === 'login') {
  const errEl = document.getElementById('errMsg');
  errEl.textContent = '🔐 Vui lòng đăng nhập để sử dụng tính năng này';
  errEl.classList.add('show');
}

/* ── WARMUP PING: đánh thức Apps Script ngay khi trang load ── */
let warmedUp = false;
function warmup() {
  fetch(SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ action: 'ping' }),
    keepalive: true,
  })
  .then(() => { warmedUp = true; })
  .catch(() => {});
}
warmup();

/* ── LOADING STEPS ── */
const LOADING_STEPS = [
  'Đang kết nối máy chủ...',
  'Đang xác thực tài khoản...',
  'Đang tải dữ liệu...',
];
let stepTimer = null;

function startLoadingSteps() {
  const loadingText = document.querySelector('.loading-text');
  let step = 0;
  loadingText.textContent = LOADING_STEPS[0];
  stepTimer = setInterval(() => {
    step = Math.min(step + 1, LOADING_STEPS.length - 1);
    loadingText.textContent = LOADING_STEPS[step];
  }, 2500);
}

function stopLoadingSteps() {
  if (stepTimer) { clearInterval(stepTimer); stepTimer = null; }
}

/* ── LOGIN qua Apps Script ── */
async function doLogin() {
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value.trim();
  const errEl = document.getElementById('errMsg');
  errEl.classList.remove('show');

  if (!u || !p) {
    errEl.textContent = 'Vui lòng nhập đầy đủ tài khoản và mật khẩu';
    errEl.classList.add('show');
    return;
  }

  const overlay = document.getElementById('loadingOverlay');
  const btn     = document.getElementById('btnLogin');
  overlay.classList.add('show');
  btn.disabled = true;
  startLoadingSteps();

  /* Timeout 12 giây */
  const controller = new AbortController();
  const timeoutId  = setTimeout(() => controller.abort(), 12000);

  try {
    const res = await fetch(SCRIPT_URL, {
      method:   'POST',
      headers:  { 'Content-Type': 'text/plain' },
      body:     JSON.stringify({ action: 'login', user: u, pass: p }),
      redirect: 'follow',
      signal:   controller.signal,
    });
    clearTimeout(timeoutId);
    const data = await res.json();

    if (data.ok) {
      stopLoadingSteps();
      document.querySelector('.loading-text').textContent = 'Đăng nhập thành công!';
      sessionStorage.setItem('nhadep_role',  data.role);
      sessionStorage.setItem('nhadep_user',  u);
      sessionStorage.setItem('nhadep_token', data.token);
      setTimeout(() => { location.href = 'home.html'; }, 400);
    } else {
      stopLoadingSteps();
      errEl.textContent = 'Tài khoản hoặc mật khẩu không đúng';
      errEl.classList.add('show');
      overlay.classList.remove('show');
      btn.disabled = false;
    }
  } catch (err) {
    clearTimeout(timeoutId);
    stopLoadingSteps();
    overlay.classList.remove('show');
    btn.disabled = false;
    errEl.textContent = err.name === 'AbortError'
      ? '⏱ Kết nối quá lâu. Vui lòng thử lại.'
      : '⚠ Lỗi kết nối. Vui lòng thử lại.';
    errEl.classList.add('show');
    setTimeout(warmup, 1000);
  }
}

/* ── ENTER để login ── */
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
